services:
  db:
    image: postgres:15
    container_name: dynamic-form-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: formdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d formdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dynamic_form_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: dynamic-form-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/formdb
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: dynamic-form-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5174:5173"
    depends_on:
      - server

volumes:
  dynamic_form_data:
